<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insight-Flow : Data Analysis Agent</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f5f0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .container {
    width: 100%;
    max-width: 740px;
    height: 92vh;
    background: white;
    border-radius: 16px;
    border: 1px solid #e2e0d8;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    padding: 18px 24px;
    border-bottom: 1px solid #e2e0d8;
  }

  header h1 { font-size: 16px; font-weight: 500; color: #2c2c2a; }
  header p  { font-size: 13px; color: #888780; margin-top: 2px; }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .msg {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.user {
    background: #534AB7;
    color: white;
    align-self: flex-end;
    border-radius: 12px 12px 2px 12px;
  }

  .msg.agent {
    background: #f1efe8;
    color: #2c2c2a;
    align-self: flex-start;
    border-radius: 12px 12px 12px 2px;
  }

  .msg.error {
    background: #fcebeb;
    color: #a32d2d;
    align-self: flex-start;
    border-radius: 12px;
    font-size: 13px;
  }

  .msg.thinking {
    background: #faeeda;
    color: #854F0B;
    align-self: flex-start;
    font-size: 13px;
    border-radius: 12px;
  }

  .steps-badge {
    font-size: 11px;
    color: #888780;
    margin-top: -8px;
    margin-left: 4px;
  }

  .suggestions {
    padding: 0 24px 12px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .suggestion-btn {
    background: none;
    border: 1px solid #d3d1c7;
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    color: #5f5e5a;
    cursor: pointer;
  }

  .suggestion-btn:hover:not(:disabled) { background: #f1efe8; }
  .suggestion-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .input-area {
    padding: 16px 24px;
    border-top: 1px solid #e2e0d8;
    display: flex;
    gap: 10px;
  }

  #user-input {
    flex: 1;
    padding: 10px 16px;
    border: 1px solid #d3d1c7;
    border-radius: 24px;
    font-size: 14px;
    outline: none;
  }

  #user-input:focus { border-color: #534AB7; }
  #user-input:disabled { background: #f5f5f0; }

  #send-btn {
    background: #534AB7;
    color: white;
    border: none;
    border-radius: 24px;
    padding: 10px 22px;
    font-size: 14px;
    cursor: pointer;
  }

  #send-btn:hover:not(:disabled) { background: #3C3489; }
  #send-btn:disabled { background: #b4b2a9; cursor: not-allowed; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Data Analysis Agent</h1>
    <p>Powered by LangGraph · ReAct architecture</p>
  </header>

  <div id="messages">
    <div class="msg agent">
      Hi! I'm your data analysis agent. I can load CSV files, run pandas analysis, and answer questions about your data. Try asking me something below.
    </div>
  </div>

  <div class="suggestions">
    <button class="suggestion-btn" onclick="prefill('Load the sales CSV and summarize it')">Load sales CSV</button>
    <button class="suggestion-btn" onclick="prefill('What is the total sales by region?')">Sales by region</button>
    <button class="suggestion-btn" onclick="prefill('Show me the top 3 months by revenue')">Top months</button>
    <button class="suggestion-btn" onclick="prefill('Are there any anomalies in the data?')">Find anomalies</button>
  </div>

  <div class="input-area">
    <input id="user-input" type="text" placeholder="Ask about your data..." />
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("user-input");
  const sendBtn    = document.getElementById("send-btn");
  const suggBtns   = document.querySelectorAll(".suggestion-btn");

  // Press Enter to send
  inputEl.addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !sendBtn.disabled) sendMessage();
  });

  // Prefill input from suggestion buttons
  function prefill(text) {
    inputEl.value = text;
    inputEl.focus();
  }

  function setLoading(on) {
    sendBtn.disabled = on;
    inputEl.disabled = on;
    suggBtns.forEach(b => b.disabled = on);
  }

  function addMsg(text, cls) {
    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.textContent = text;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = "";
    setLoading(true);

    addMsg(text, "user");
    const thinking = addMsg("Agent is thinking and using tools... this may take 10–20 seconds", "thinking");

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
      });

      if (!res.ok) {
        throw new Error("Server returned " + res.status + " " + res.statusText);
      }

      const data = await res.json();
      thinking.remove();

      addMsg(data.response, "agent");

      if (data.steps) {
        const badge = document.createElement("div");
        badge.className = "steps-badge";
        badge.textContent = data.steps + " reasoning steps";
        messagesEl.appendChild(badge);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

    } catch (err) {
      thinking.remove();
      addMsg("Error: " + err.message + "\n\nCheck your terminal for details.", "error");
    }

    setLoading(false);
    inputEl.focus();
  }
</script>
</body>
</html>
